# cognitive-complexity gate via gocognit.
# Hard gate — every function must stay under min-complexity 30. The whole
# package was refactored to satisfy this (no grandfathered offenders), so a
# plain `golangci-lint run ./...` reports zero issues and CI fails on any
# function that regresses past 30.
version: "2"

linters:
  default: none
  enable:
    - gocognit
  settings:
    gocognit:
      min-complexity: 30
  exclusions:
    rules:
      # Tests legitimately sequence many setup + assertion steps;
      # gocognit on test files produces noise, not signal.
      - path: _test\.go
        linters:
          - gocognit
